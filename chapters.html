<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We Revise — Chapitres</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="chapters">

    <!-- HEADER dynamique -->
    <header></header>

    <div class="page-container">
        <main>
            <h2 id="subject-title">Chapitres</h2>

            <div class="chapter-list"></div>

            <button class="btn" id="add-chapter-btn">+ Ajouter un chapitre</button>
        </main>
    </div>

    <div id="modal-create" class="custom-modal" role="dialog" aria-modal="true" aria-labelledby="modal-create-title">
        <div class="custom-modal-content">
            <button class="modal-close" type="button" aria-label="Fermer" onclick="closeModal('modal-create')">&times;</button>

            <h3 id="modal-create-title">Nouveau chapitre</h3>

            <label class="modal-field" for="chapterName">
                <span>Nom du chapitre</span>
                <input id="chapterName" type="text" autocomplete="off" placeholder="Ex : La Premi&egrave;re Guerre mondiale">
            </label>

            <div class="modal-actions">
                <button class="btn btn-secondary" type="button" onclick="closeModal('modal-create')">Annuler</button>
                <button class="btn" type="button" onclick="submitCreateChapter()">Cr&eacute;er</button>
            </div>
        </div>
    </div>

    <!-- FOOTER dynamique -->
    <footer></footer>
 

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="header-footer.js"></script>
<script src="app.js"></script>

    <script>
        // Gestion du bouton "Ajouter un chapitre"
        document.addEventListener("DOMContentLoaded", () => {
            const subject = JSON.parse(localStorage.getItem("currentSubject"));
            if (subject) {
                document.getElementById("subject-title").textContent = subject.name;
            }

            document.getElementById("add-chapter-btn").onclick = () => openModal("modal-create");
        });
    </script>

<script src="analytics.js"></script>
</body>
</html>
